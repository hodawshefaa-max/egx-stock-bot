name: EGX Daily Stock Report

on:
  schedule:
    - cron: '0 8 * * 0-4'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run EGX Bot
        run: python egx_bot.py
