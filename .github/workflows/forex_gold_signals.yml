name: Forex & Gold Signals Bot

on:
  schedule:
    - cron: '0 * * * *'  # Every hour, 24/7    - cron: '0 8,12,16 * * 6'         # Saturday (gold markets open)
  
jobs:
  analyze-and-signal:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install yfinance pandas numpy requests ta python-telegram-bot

    - name: Run Forex & Gold Analysis Bot
      env:
        TELEGRAM_TOKEN: ${{ secrets.FOREX_TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python forex_gold_signals_bot.py
