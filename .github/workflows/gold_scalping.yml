name: Gold Scalping Bot

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes for scalping
  workflow_dispatch:

jobs:
  run-gold-scalping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests pandas yfinance ta

      - name: Run Gold Scalping Bot
        env:
          GOLD_TELEGRAM_TOKEN: ${{ secrets.GOLD_TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python gold_scalping_bot.py
